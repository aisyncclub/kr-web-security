version: "2.0"
last_updated: "2026-04-03"
description: "범용 웹 보안 점검 체크리스트 (OWASP ASVS L1 + CWE Top 25 기반)"

# 국가별 규정은 compliance/ 모듈로 분리
compliance_modules:
  - kr   # 한국: 개인정보보호법, 전자상거래법
  - eu   # EU: GDPR
  - us   # 미국: CCPA

categories:
  # ─────────────────────────────────────────
  # OWASP A01:2021 Broken Access Control
  # ─────────────────────────────────────────
  - id: access_control
    name: "접근 제어 (A01)"
    owasp: "A01:2021"
    items:
      - id: ac-001
        title: "최소 권한 원칙"
        description: "사용자/서비스 계정에 필요한 최소 권한만 부여"
        severity: critical
        check_type: manual

      - id: ac-002
        title: "관리자 페이지 접근 제한"
        description: "IP 화이트리스트, VPN, 또는 2FA 적용"
        severity: critical
        check_type: manual

      - id: ac-003
        title: "CSRF 토큰"
        description: "모든 상태 변경 요청에 CSRF 토큰 적용"
        severity: critical
        check_type: code_scan
        pattern: "method=['\"]POST['\"](?!.*csrf|_token|_csrf)"

      - id: ac-004
        title: "경로 순회 방지"
        description: "사용자 입력으로 파일 경로 접근 시 정규화 검증"
        severity: critical
        check_type: code_scan
        pattern: "path\\.join\\(.*req\\.|readFile\\(.*req\\.|readFileSync\\(.*req\\."

      - id: ac-005
        title: "IDOR 방지"
        description: "리소스 접근 시 소유권 검증 (ID 직접 노출 금지)"
        severity: high
        check_type: manual

  # ─────────────────────────────────────────
  # OWASP A02:2021 Cryptographic Failures
  # ─────────────────────────────────────────
  - id: crypto
    name: "암호화 (A02)"
    owasp: "A02:2021"
    items:
      - id: cr-001
        title: "비밀번호 안전한 해시"
        description: "bcrypt/argon2/scrypt 사용 (MD5/SHA1 금지)"
        severity: critical
        check_type: code_scan
        pattern: "createHash\\(['\"]md5|createHash\\(['\"]sha1|MD5\\(|SHA1\\("

      - id: cr-002
        title: "HTTPS 강제"
        description: "HTTP→HTTPS 301 리다이렉트"
        severity: critical
        check_type: http_header
        expected: "301 redirect to https"

      - id: cr-003
        title: "TLS 1.2 이상"
        description: "TLS 1.0/1.1 비활성화"
        severity: high
        check_type: manual

      - id: cr-004
        title: "민감 데이터 암호화 저장"
        description: "PII, 결제정보 등 AES-256-GCM 이상으로 암호화"
        severity: critical
        check_type: manual

      - id: cr-005
        title: "하드코딩된 시크릿 금지"
        description: "API 키, 비밀번호 등 소스코드에 직접 기록 금지"
        severity: critical
        check_type: code_scan
        pattern: "api[_-]?key\\s*[:=]\\s*['\"][a-zA-Z0-9]{16,}|password\\s*[:=]\\s*['\"][^'\"]{6,}|secret\\s*[:=]\\s*['\"][a-zA-Z0-9]{16,}"

      - id: cr-006
        title: "안전한 랜덤 생성"
        description: "보안 목적으로 Math.random() 대신 crypto API 사용"
        severity: medium
        check_type: code_scan
        pattern: "Math\\.random\\(\\)"

  # ─────────────────────────────────────────
  # OWASP A03:2021 Injection
  # ─────────────────────────────────────────
  - id: injection
    name: "인젝션 (A03)"
    owasp: "A03:2021"
    items:
      - id: inj-001
        title: "SQL Injection 방지"
        description: "Prepared Statement 사용, 문자열 연결 쿼리 금지"
        severity: critical
        check_type: code_scan
        pattern: "\\$\\{.*\\}.*(?:SELECT|INSERT|UPDATE|DELETE|WHERE)|query\\s*\\(\\s*[`'\"].*\\+"

      - id: inj-002
        title: "XSS 방지"
        description: "사용자 입력 이스케이프, innerHTML 사용 금지"
        severity: critical
        check_type: code_scan
        pattern: "innerHTML\\s*=|dangerouslySetInnerHTML|document\\.write\\("

      - id: inj-003
        title: "Command Injection 방지"
        description: "사용자 입력을 쉘 명령에 직접 전달 금지"
        severity: critical
        check_type: code_scan
        pattern: "exec\\(.*\\$\\{|spawn\\(.*\\$\\{|child_process.*\\$\\{"

      - id: inj-004
        title: "SSRF 방지"
        description: "사용자 입력 URL로 서버 측 요청 시 화이트리스트 검증"
        severity: high
        check_type: code_scan
        pattern: "fetch\\(.*req\\.|fetch\\(.*params\\.|fetch\\(.*query\\."

      - id: inj-005
        title: "eval 사용 금지"
        description: "eval(), new Function() 사용 금지"
        severity: high
        check_type: code_scan
        pattern: "\\beval\\s*\\(|new\\s+Function\\s*\\("

      - id: inj-006
        title: "HTML Sanitizer 적용"
        description: "사용자 HTML 입력 허용 시 서버 측 sanitizer 적용"
        severity: critical
        check_type: code_scan
        pattern: "innerHTML\\s*=|v-html|dangerouslySetInnerHTML"

  # ─────────────────────────────────────────
  # OWASP A05:2021 Security Misconfiguration
  # ─────────────────────────────────────────
  - id: headers
    name: "보안 헤더 (A05)"
    owasp: "A05:2021"
    items:
      - id: hdr-001
        title: "HSTS"
        description: "Strict-Transport-Security: max-age=31536000"
        severity: high
        check_type: http_header
        header: "Strict-Transport-Security"
        expected: "max-age=31536000"

      - id: hdr-002
        title: "CSP"
        description: "Content-Security-Policy 설정"
        severity: high
        check_type: http_header
        header: "Content-Security-Policy"
        expected: "default-src"

      - id: hdr-003
        title: "X-Frame-Options"
        description: "클릭재킹 방지"
        severity: medium
        check_type: http_header
        header: "X-Frame-Options"
        expected: "DENY|SAMEORIGIN"

      - id: hdr-004
        title: "X-Content-Type-Options"
        description: "MIME 스니핑 방지"
        severity: medium
        check_type: http_header
        header: "X-Content-Type-Options"
        expected: "nosniff"

      - id: hdr-005
        title: "Referrer-Policy"
        description: "리퍼러 정보 제한"
        severity: medium
        check_type: http_header
        header: "Referrer-Policy"
        expected: "strict-origin-when-cross-origin"

      - id: hdr-006
        title: "Permissions-Policy"
        description: "브라우저 기능 접근 제한 (카메라, 마이크 등)"
        severity: medium
        check_type: http_header
        header: "Permissions-Policy"
        expected: "설정됨"

      - id: hdr-007
        title: "쿠키 보안 플래그"
        description: "Secure; HttpOnly; SameSite 설정"
        severity: high
        check_type: http_header
        header: "Set-Cookie"
        expected: "Secure; HttpOnly; SameSite"

      - id: hdr-008
        title: "Server 헤더 제거"
        description: "서버 소프트웨어 정보 노출 방지"
        severity: low
        check_type: http_header
        header: "Server"
        expected: "제거 또는 최소화"

      - id: hdr-009
        title: "X-Powered-By 제거"
        description: "프레임워크 정보 노출 방지"
        severity: low
        check_type: http_header
        header: "X-Powered-By"
        expected: "제거"

      - id: hdr-010
        title: "CORS 설정"
        description: "Access-Control-Allow-Origin에 와일드카드(*) 금지"
        severity: high
        check_type: http_header
        header: "Access-Control-Allow-Origin"
        expected: "특정 도메인만 허용"

  # ─────────────────────────────────────────
  # OWASP A06:2021 Vulnerable Components
  # ─────────────────────────────────────────
  - id: dependency
    name: "의존성 (A06)"
    owasp: "A06:2021"
    items:
      - id: dep-001
        title: "알려진 취약점 없음"
        description: "npm/bun audit 결과 critical/high 없음"
        severity: critical
        check_type: dependency

      - id: dep-002
        title: "의존성 정기 업데이트"
        description: "분기별 의존성 업데이트, lockfile 유지"
        severity: medium
        check_type: manual

  # ─────────────────────────────────────────
  # OWASP A07:2021 Auth Failures
  # ─────────────────────────────────────────
  - id: auth
    name: "인증 (A07)"
    owasp: "A07:2021"
    items:
      - id: auth-001
        title: "로그인 실패 제한"
        description: "5회 실패 시 계정 잠금 또는 딜레이 적용"
        severity: high
        check_type: manual

      - id: auth-002
        title: "Rate Limiting"
        description: "IP당 분당 요청 수 제한"
        severity: high
        check_type: manual

      - id: auth-003
        title: "세션 타임아웃"
        description: "비활성 시 자동 로그아웃"
        severity: medium
        check_type: manual

      - id: auth-004
        title: "봇 방어"
        description: "로그인/회원가입에 CAPTCHA 적용"
        severity: medium
        check_type: manual

  # ─────────────────────────────────────────
  # OWASP A09:2021 Logging Failures
  # ─────────────────────────────────────────
  - id: logging
    name: "로깅/모니터링 (A09)"
    owasp: "A09:2021"
    items:
      - id: log-001
        title: "인증 이벤트 로깅"
        description: "로그인 성공/실패 IP, User-Agent, 시간 기록"
        severity: high
        check_type: manual

      - id: log-002
        title: "관리자 활동 로깅"
        description: "관리자 기능 실행(누가, 언제, 무엇을) 기록"
        severity: high
        check_type: manual

      - id: log-003
        title: "이상 행동 알림"
        description: "동일 IP 반복 실패, 대량 데이터 접근 시 알림"
        severity: high
        check_type: manual

      - id: log-004
        title: "로그에 민감정보 미포함"
        description: "로그에 비밀번호, 토큰, PII 기록 금지"
        severity: critical
        check_type: code_scan
        pattern: "console\\.log\\(.*password|console\\.log\\(.*token|console\\.log\\(.*secret"

  # ─────────────────────────────────────────
  # 파일 업로드
  # ─────────────────────────────────────────
  - id: upload
    name: "파일 업로드"
    items:
      - id: up-001
        title: "확장자 화이트리스트"
        description: "허용된 확장자만 업로드 (서버 측 검증)"
        severity: critical
        check_type: manual

      - id: up-002
        title: "매직바이트 검증"
        description: "파일 헤더로 실제 타입 검증"
        severity: high
        check_type: manual

      - id: up-003
        title: "업로드 디렉토리 실행 권한 제거"
        description: "업로드 폴더에서 스크립트 실행 불가"
        severity: critical
        check_type: manual

      - id: up-004
        title: "파일 크기 제한"
        description: "업로드 파일 크기 제한 (DoS 방지)"
        severity: medium
        check_type: manual

  # ─────────────────────────────────────────
  # CI/CD 보안
  # ─────────────────────────────────────────
  - id: cicd
    name: "CI/CD 보안"
    items:
      - id: ci-001
        title: "시크릿 스캐닝"
        description: "pre-commit hook 또는 CI에서 gitleaks/trufflehog 실행"
        severity: critical
        check_type: manual

      - id: ci-002
        title: "의존성 자동 점검"
        description: "CI 파이프라인에 SCA(Trivy/Snyk) 통합"
        severity: high
        check_type: manual

      - id: ci-003
        title: "SAST 자동 실행"
        description: "PR마다 Semgrep 또는 코드 스캔 자동 실행"
        severity: high
        check_type: manual
